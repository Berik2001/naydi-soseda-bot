name: CI

# Проверяем код при каждом пуше в main и в каждом pull request.
# Цель — не дать сломанному коду уехать в деплой на Railway.
on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint-and-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout кода
        uses: actions/checkout@v4

      - name: Установка Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Установка зависимостей
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff

      - name: Линт (только критические ошибки)
        # E9 — синтаксис, F63/F7 — логические ошибки, F82 — неопределённые имена
        run: ruff check --select=E9,F63,F7,F82 .

      - name: Проверка компиляции всех модулей
        run: python -m compileall -q bot.py texts.py database handlers keyboards states
