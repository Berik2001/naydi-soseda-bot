name: CI

# Проверяем код при каждом пуше в main и в каждом pull request.
# Railway настроен ждать успешного прохождения этого workflow перед деплоем
# (Settings -> Wait for CI), поэтому красный CI = деплой не уезжает.
on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    # Эфемерный PostgreSQL для интеграционных тестов слоя БД (test_integration_db.py).
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Checkout кода
        uses: actions/checkout@v4

      - name: Установка Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      - name: Установка зависимостей (prod + dev)
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Линт (только критические ошибки)
        # E9 — синтаксис, F63/F7 — логические ошибки, F82 — неопределённые имена
        run: ruff check --select=E9,F63,F7,F82 .

      - name: Проверка компиляции всех модулей
        run: python -m compileall -q bot.py config.py texts.py cards.py media_flow.py validators.py tg_retry.py database handlers keyboards states middlewares

      - name: Тесты (pytest)
        env:
          # Строка к сервису postgres выше — включает интеграционные тесты БД
          TEST_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/postgres
        run: pytest -q
